rootProject.name = 'BnbClientApp'

apply from: new File(rootDir, 'node_modules/react-native/react.gradle')

include ':app'

def reactNativeRootDir = new File(rootDir, "../node_modules/react-native")
apply from: new File(reactNativeRootDir, "packages/react-native-codegen/scripts/generate-codegen-settings.gradle")

def dotenvFile = file("${rootDir}/.env")
if (dotenvFile.exists()) {
    dotenvFile.eachLine { line ->
        def (key, value) = line.split('=')
        if (key && value) {
            System.setProperty(key.trim(), value.trim())
        }
    }
}

