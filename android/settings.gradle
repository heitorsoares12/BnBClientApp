pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
}

plugins { id("com.facebook.react.settings") }

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        // Mapbox SDK repository
        maven {
            url 'https://api.mapbox.com/downloads/v2/releases/maven'
            authentication { basic(BasicAuthentication) }
            credentials {
                username = "mapbox"
                password = providers.gradleProperty("MAPBOX_DOWNLOADS_TOKEN").orNull ?: System.getenv("MAPBOX_DOWNLOADS_TOKEN")
            }
        }
    }
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand()
}

rootProject.name = 'BnbClientApp'
include ':app'
apply from: file("../node_modules/@react-native/gradle-plugin/native_modules.gradle")
applyNativeModulesSettingsGradle(settings)
includeBuild('../node_modules/@rnmapbox/maps/android')